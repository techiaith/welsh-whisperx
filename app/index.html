<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhisperX Transcription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 80%;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .upload-section {
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 2px dashed #667eea;
            border-radius: 8px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
        }

        input[type="file"]:hover {
            border-color: #764ba2;
            background: #f0f1ff;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-option input[type="radio"] {
            cursor: pointer;
        }

        .radio-option label {
            margin: 0;
            font-weight: normal;
            cursor: pointer;
        }

        .mode-info {
            font-size: 0.9em;
            color: #666;
            padding: 10px;
            background: #f8f9ff;
            border-radius: 6px;
            margin-top: 10px;
        }

        .task-group {
            margin-top: 15px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
            display: block;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
            display: block;
        }

        .status.error {
            background: #ffebee;
            color: #d32f2f;
            border-left: 4px solid #d32f2f;
            display: block;
        }

        .status.warning {
            background: #fff3e0;
            color: #f57c00;
            border-left: 4px solid #f57c00;
            display: block;
        }

        .progress {
            margin-top: 10px;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .results {
            margin-top: 20px;
        }

        .json-tree {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 14px;
            max-height: 600px;
            overflow: auto;
        }

        .json-key {
            color: #a71d5d;
            font-weight: 600;
        }

        .json-string {
            color: #0086b3;
        }

        .json-number {
            color: #005cc5;
        }

        .json-boolean {
            color: #d73a49;
        }

        .json-null {
            color: #6f42c1;
        }

        .json-item {
            margin-left: 20px;
            position: relative;
        }

        .json-toggle {
            cursor: pointer;
            user-select: none;
            display: inline-block;
            width: 20px;
            color: #666;
            font-weight: bold;
        }

        .json-toggle:hover {
            color: #333;
        }

        .json-collapsed {
            display: none;
        }

        .copy-btn {
            float: right;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            margin-bottom: 10px;
        }

        .stt-id {
            font-family: monospace;
            background: #f0f1ff;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .file-info {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
        }

        .audio-preview {
            margin-top: 15px;
            display: none;
        }

        .audio-preview.visible {
            display: block;
        }

        .audio-preview audio {
            width: 100%;
            max-width: 500px;
            height: 40px;
        }

        .log-container {
            margin-top: 15px;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Courier New', monospace;
            font-size: 11px;
            display: none;
        }

        .log-container.visible {
            display: block;
        }

        .log-line {
            color: #d4d4d4;
            margin-bottom: 4px;
            line-height: 1.5;
        }

        .log-line:last-child {
            margin-bottom: 0;
        }

        .log-header {
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 10px;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ WhisperX Transcription</h1>
            <p>Upload audio files and get accurate transcriptions</p>
        </div>

        <div class="card">
            <div class="upload-section">
                <div class="form-group">
                    <label>Select Audio File</label>
                    <input type="file" id="audioFile" accept="audio/*">
                    <div class="file-info" id="fileInfo"></div>
                    <div class="audio-preview" id="audioPreview">
                        <audio id="audioPlayer" controls></audio>
                    </div>
                </div>

                <div class="form-group">
                    <label>Transcription Mode</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="modeShort" name="mode" value="short" checked>
                            <label for="modeShort">Short (&lt;480KB)</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="modeLong" name="mode" value="long">
                            <label for="modeLong">Long Form (Any size)</label>
                        </div>
                    </div>
                    <div class="mode-info" id="modeInfo">
                        <strong>Short mode:</strong> For files &lt;480KB. Returns results immediately (synchronous).
                    </div>
                </div>

                <div class="form-group task-group">
                    <label>Task Type</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="taskTranscribe" name="task" value="transcribe" checked>
                            <label for="taskTranscribe">Transcribe</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="taskTranslate" name="task" value="translate">
                            <label for="taskTranslate">Translate</label>
                        </div>
                    </div>
                </div>

                <button id="uploadBtn" onclick="uploadFile()">Upload & Transcribe</button>
            </div>

            <div id="status" class="status"></div>

            <div id="logContainer" class="log-container">
                <div class="log-header">Progress Log:</div>
                <div id="logContent"></div>
            </div>

            <div id="results" class="results" style="display: none;">
                <h3 id="resultsHeading">Results</h3>
                <button class="copy-btn" onclick="copyToClipboard()">📋 Copy JSON</button>
                <div id="jsonTree" class="json-tree"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = `${window.location.protocol}//${window.location.hostname}:5511`;
        let currentSttId = null;
        let pollingInterval = null;

        // Update button text when task changes
        document.querySelectorAll('input[name="task"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const btn = document.getElementById('uploadBtn');
                btn.textContent = e.target.value === 'translate'
                    ? 'Upload & Translate'
                    : 'Upload & Transcribe';
            });
        });

        // Update mode info when radio changes
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const info = document.getElementById('modeInfo');
                if (e.target.value === 'short') {
                    info.innerHTML = '<strong>Short mode:</strong> For files &lt;480KB. Returns results immediately (synchronous).';
                } else {
                    info.innerHTML = '<strong>Long form mode:</strong> For any size file. Processes in background (asynchronous). Poll for results.';
                }
            });
        });

        // Show file info and audio preview
        document.getElementById('audioFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                const sizeKB = (file.size / 1024).toFixed(2);
                document.getElementById('fileInfo').textContent = `Selected: ${file.name} (${sizeMB} MB / ${sizeKB} KB)`;

                // Auto-select mode based on file size
                if (file.size < 480000) {
                    document.getElementById('modeShort').checked = true;
                } else {
                    document.getElementById('modeLong').checked = true;
                }
                document.querySelector('input[name="mode"]:checked').dispatchEvent(new Event('change'));

                // Load audio file into player
                const audioPreview = document.getElementById('audioPreview');
                const audioPlayer = document.getElementById('audioPlayer');
                const fileURL = URL.createObjectURL(file);
                audioPlayer.src = fileURL;
                audioPreview.classList.add('visible');

                // Cleanup old object URL when new file is loaded
                audioPlayer.addEventListener('load', () => {
                    URL.revokeObjectURL(fileURL);
                }, { once: true });
            } else {
                // Hide preview if no file selected
                document.getElementById('audioPreview').classList.remove('visible');
            }
        });

        async function uploadFile() {
            const fileInput = document.getElementById('audioFile');
            const file = fileInput.files[0];

            if (!file) {
                showStatus('Please select an audio file', 'error');
                return;
            }

            const mode = document.querySelector('input[name="mode"]:checked').value;
            const task = document.querySelector('input[name="task"]:checked').value;

            const formData = new FormData();
            formData.append('soundfile', file);

            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            document.getElementById('results').style.display = 'none';
            hideLog(); // Clear previous logs

            try {
                if (mode === 'short') {
                    await uploadShort(formData, task);
                } else {
                    await uploadLong(formData, task);
                }
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
                uploadBtn.disabled = false;
            }
        }

        async function uploadShort(formData, task) {
            const endpoint = task === 'translate' ? '/translate/' : '/transcribe/';
            const action = task === 'translate' ? 'translating' : 'transcribing';
            showStatus(`Uploading and ${action}... (synchronous)`, 'info');

            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const result = await response.json();

            if (result.success === false) {
                showStatus(result.message || 'Transcription failed', 'error');
                document.getElementById('uploadBtn').disabled = false;
                return;
            }

            const doneLabel = task === 'translate' ? 'Translation' : 'Transcription';
            showStatus(`✓ ${doneLabel} completed!`, 'success');
            displayResults(result);
            document.getElementById('uploadBtn').disabled = false;
        }

        async function uploadLong(formData, task) {
            showStatus('Uploading file...', 'info');

            const endpoint = task === 'translate' ? '/translate_long_form/' : '/transcribe_long_form/';
            const response = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const result = await response.json();
            currentSttId = result.id;

            const queuedLabel = task === 'translate' ? 'Translation' : 'Transcription';
            showStatus(`Uploaded! ${queuedLabel} queued. <span class="stt-id">ID: ${currentSttId}</span>`, 'info');
            showProgress();

            // Start polling for status
            pollStatus();
        }

        async function pollStatus() {
            if (!currentSttId) return;

            try {
                const response = await fetch(`${API_BASE}/get_status/?stt_id=${currentSttId}`);
                const status = await response.json();

                // Display log content and extract progress if available
                if (status.log && status.log.length > 0) {
                    const progress = extractProgress(status.log);
                    displayLog(status.log, progress);
                }

                const currentTask = document.querySelector('input[name="task"]:checked').value;
                const taskLabel = currentTask === 'translate' ? 'Translation' : 'Transcription';

                if (status.status === 'SUCCESS') {
                    clearInterval(pollingInterval);
                    showStatus(`✓ ${taskLabel} completed! Fetching results...`, 'success');
                    await fetchResults();
                } else if (status.status === 'FAILURE') {
                    clearInterval(pollingInterval);
                    showStatus(`✗ ${taskLabel} failed. Check logs for details.`, 'error');
                    document.getElementById('uploadBtn').disabled = false;
                } else {
                    // Still processing
                    const statusText = status.status === 'STARTED' ? 'Processing...' : 'In queue...';
                    showStatus(`${statusText} <span class="stt-id">ID: ${currentSttId}</span>`, 'info');
                    showProgress();

                    // Continue polling
                    setTimeout(pollStatus, 2000); // Poll every 2 seconds
                }
            } catch (error) {
                clearInterval(pollingInterval);
                showStatus(`Error checking status: ${error.message}`, 'error');
                document.getElementById('uploadBtn').disabled = false;
            }
        }

        async function fetchResults() {
            try {
                const response = await fetch(`${API_BASE}/get_json/?stt_id=${currentSttId}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const result = await response.json();
                displayResults(result);
                document.getElementById('uploadBtn').disabled = false;
                hideProgress();
                hideLog(); // Hide log when showing final results
            } catch (error) {
                showStatus(`Error fetching results: ${error.message}`, 'error');
                document.getElementById('uploadBtn').disabled = false;
                hideProgress();
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }

        function showProgress() {
            const statusDiv = document.getElementById('status');
            if (!statusDiv.querySelector('.progress')) {
                const progress = document.createElement('div');
                progress.className = 'progress';
                progress.innerHTML = '<div class="progress-bar" style="width: 100%"></div>';
                statusDiv.appendChild(progress);
            }
        }

        function hideProgress() {
            const progress = document.querySelector('.progress');
            if (progress) progress.remove();
        }

        function extractProgress(logLines) {
            // Look for log lines like: "Processing segment 5/20 (duration: 3.45s): text..."
            const segmentRegex = /Processing segment (\d+)\/(\d+)/;

            let current = 0;
            let total = 0;

            // Scan from end of log to get most recent progress
            for (let i = logLines.length - 1; i >= 0; i--) {
                const match = logLines[i].match(segmentRegex);
                if (match) {
                    current = parseInt(match[1]);
                    total = parseInt(match[2]);
                    break;
                }
            }

            if (total > 0) {
                return {
                    current: current,
                    total: total,
                    percentage: Math.round((current / total) * 100)
                };
            }

            return null;
        }

        function displayLog(logLines, progress = null) {
            const logContainer = document.getElementById('logContainer');
            const logContent = document.getElementById('logContent');

            if (!logLines || logLines.length === 0) {
                logContainer.classList.remove('visible');
                return;
            }

            // Show log container
            logContainer.classList.add('visible');

            // Update header with progress if available
            const logHeader = logContainer.querySelector('.log-header');
            if (progress) {
                logHeader.textContent = `Progress Log: ${progress.current}/${progress.total} segments (${progress.percentage}%)`;
            } else {
                logHeader.textContent = 'Progress Log:';
            }

            // Render log lines
            logContent.innerHTML = logLines
                .map(line => `<div class="log-line">${escapeHtml(line)}</div>`)
                .join('');

            // Auto-scroll to bottom
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function hideLog() {
            const logContainer = document.getElementById('logContainer');
            logContainer.classList.remove('visible');
            document.getElementById('logContent').innerHTML = '';
        }

        function displayResults(data) {
            const resultsDiv = document.getElementById('results');
            const jsonTree = document.getElementById('jsonTree');

            jsonTree.innerHTML = renderJSON(data);
            resultsDiv.style.display = 'block';

            // Scroll to results
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function renderJSON(obj, level = 0) {
            if (obj === null) return `<span class="json-null">null</span>`;
            if (obj === undefined) return `<span class="json-null">undefined</span>`;

            const type = typeof obj;

            if (type === 'string') return `<span class="json-string">"${escapeHtml(obj)}"</span>`;
            if (type === 'number') return `<span class="json-number">${obj}</span>`;
            if (type === 'boolean') return `<span class="json-boolean">${obj}</span>`;

            if (Array.isArray(obj)) {
                if (obj.length === 0) return '[]';

                const id = `arr-${Math.random().toString(36).substr(2, 9)}`;
                let html = `<span class="json-toggle" onclick="toggleCollapse('${id}')">▼</span>[<div class="json-item" id="${id}">`;

                obj.forEach((item, idx) => {
                    html += renderJSON(item, level + 1);
                    if (idx < obj.length - 1) html += ',';
                    html += '<br>';
                });

                html += `</div>]`;
                return html;
            }

            if (type === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '{}';

                const id = `obj-${Math.random().toString(36).substr(2, 9)}`;
                let html = `<span class="json-toggle" onclick="toggleCollapse('${id}')">▼</span>{<div class="json-item" id="${id}">`;

                keys.forEach((key, idx) => {
                    html += `<span class="json-key">"${escapeHtml(key)}"</span>: `;
                    html += renderJSON(obj[key], level + 1);
                    if (idx < keys.length - 1) html += ',';
                    html += '<br>';
                });

                html += `</div>}`;
                return html;
            }

            return String(obj);
        }

        function toggleCollapse(id) {
            const element = document.getElementById(id);
            const toggle = element.previousElementSibling;

            if (element.classList.contains('json-collapsed')) {
                element.classList.remove('json-collapsed');
                toggle.textContent = '▼';
            } else {
                element.classList.add('json-collapsed');
                toggle.textContent = '▶';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard() {
            const jsonTree = document.getElementById('jsonTree');
            const text = jsonTree.textContent;

            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
